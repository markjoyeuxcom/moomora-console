<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ── Header ───────────────────────────────────────────────── -->
    <header>
        <h1>📋 Task Board</h1>
        <div class="header-controls">
            <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            <button class="btn-primary" id="addTaskBtn">+ Add Task</button>
            <button class="btn-secondary" id="summaryBtn">📋 Daily Summary</button>
        </div>
    </header>

    <!-- ── Board (columns rendered by JS) ───────────────────────── -->
    <main id="board"></main>

    <!-- ── Task Modal (add / edit) ──────────────────────────────── -->
    <div id="taskModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm">

                <label for="taskTitle">Title *</label>
                <input type="text" id="taskTitle" placeholder="Task title" required>

                <label for="taskDesc">Description</label>
                <textarea id="taskDesc" placeholder="Optional description..."></textarea>

                <label for="taskPriority">Priority</label>
                <select id="taskPriority">
                    <option value="high">🔴 High</option>
                    <option value="medium" selected>🟡 Medium</option>
                    <option value="low">🟢 Low</option>
                </select>

                <label for="taskDueDate">Due Date <span style="color:var(--muted);font-weight:400">(optional)</span></label>
                <input type="date" id="taskDueDate">

                <label for="taskColumn">Column</label>
                <select id="taskColumn">
                    <option value="high-priority">🔴 High Priority</option>
                    <option value="in-progress">🟠 In Progress</option>
                    <option value="planned" selected>🟡 Planned</option>
                    <option value="completed">🟢 Completed</option>
                    <option value="notes">⚪ Notes / Reminders</option>
                </select>

                <div class="modal-buttons">
                    <button type="submit" class="btn-primary">Save</button>
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="button" class="btn-danger hidden" id="deleteTaskBtn">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ── Summary Modal ────────────────────────────────────────── -->
    <div id="summaryModal" class="modal hidden">
        <div class="modal-content summary-modal-content">
            <h2>📋 Daily Summary</h2>
            <pre id="summaryText"></pre>
            <div class="modal-buttons">
                <button class="btn-primary"   id="copySummaryBtn">📋 Copy</button>
                <button class="btn-secondary" id="exportSummaryBtn">💾 Export .txt</button>
                <button class="btn-secondary" id="closeSummaryBtn">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
