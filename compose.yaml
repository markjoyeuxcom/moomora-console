services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: moomora_console
      POSTGRES_USER: moomora
      POSTGRES_PASSWORD: moomora_local_dev
    ports:
      - "54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moomora -d moomora_console"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://moomora:moomora_local_dev@postgres:5432/moomora_console
    ports:
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
